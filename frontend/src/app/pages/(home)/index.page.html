<main class="page p-8">
	<section
		cdkDropListGroup
		class="section border-primary border w-full min-h-screen rounded-2xl gap-12 flex flex-col"
	>
		<task-container
			title="To Do"
			id="TODO"
			[tasks]="todoTasks()"
			[isAddTaskAllowed]="true"
			(dropped)="onCardDropped($event)"
			(addTask)="openCreationModal()"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>
		<task-container
			title="In Progress"
			id="PROGRESS"
			[tasks]="inProgressTasks()"
			[isAddTaskAllowed]="false"
			(dropped)="onCardDropped($event)"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>
		<task-container
			title="To Review"
			id="REVIEW"
			[tasks]="reviewTasks()"
			[isAddTaskAllowed]="false"
			(dropped)="onCardDropped($event)"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>
		<task-container
			title="Finished"
			id="DONE"
			[tasks]="doneTasks()"
			[isAddTaskAllowed]="false"
			(dropped)="onCardDropped($event)"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>

		@let currentTask = selectedTask();

		@if (currentTask === true){
			<task-update method="POST"/>
		}
		@else if (currentTask !== null) {
			<task-update
				[id]="currentTask.id"
				[title]="currentTask.title"
				[description]="currentTask.description"
				method="PUT"
				[status]="currentTask.status"
			/>
			<button (click)="closeEditModal()" class="btn-primary">
				Cancel
			</button>
		}

	</section>
</main>
