<main class="page p-8">
	<section
		cdkDropListGroup
		class="section border-primary border w-full min-h-screen rounded-2xl gap-12 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 p-4"
		[class.blur-2xl]="selectedTask() !== null"
	>
		<task-container
			title="To Do"
			id="TODO"
			[tasks]="todoTasks()"
			[isAddTaskAllowed]="true"
			(dropped)="onCardDropped($event)"
			(addTask)="openCreationModal()"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>
		<task-container
			title="In Progress"
			id="PROGRESS"
			[tasks]="inProgressTasks()"
			[isAddTaskAllowed]="false"
			(dropped)="onCardDropped($event)"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>
		<task-container
			title="To Review"
			id="REVIEW"
			[tasks]="reviewTasks()"
			[isAddTaskAllowed]="false"
			(dropped)="onCardDropped($event)"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>
		<task-container
			title="Finished"
			id="DONE"
			[tasks]="doneTasks()"
			[isAddTaskAllowed]="false"
			(dropped)="onCardDropped($event)"
			(deleteTask)="triggerDeleteTask($event)"
			(editTask)="openEditModal($event)"
		/>
	</section>
	<section class="fixed z-50 inset-0 flex items-center justify-center pointer-events-none p-4">
		@let currentTask = selectedTask();

		@if (currentTask === true){
			<task-update method="POST" (close)="closeEditModal()" class="pointer-events-auto w-full max-w-200" />
		}
		@else if (currentTask !== null) {

			<task-sheet
				[id]="currentTask.id"
				[title]="currentTask.title"
				[description]="currentTask.description"
				[status]="currentTask.status"
				(close)="closeEditModal()"
				class="pointer-events-auto w-full max-w-200"
			/>
		}
	</section>
</main>
